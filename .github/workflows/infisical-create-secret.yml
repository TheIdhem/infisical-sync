name: "[Infisical] Create / Update Secret"

run-name: "Infisical Secret: ${{ inputs.secret_path }} → ${{ inputs.secret_name }}"

on:
  workflow_dispatch:
    inputs:
      secret_path:
        description: "Folder path (e.g. kafka, sftp/calforex)"
        type: string
        required: true
      secret_name:
        description: "Secret key name (e.g. username)"
        type: string
        required: true
      secret_value:
        description: "Secret value"
        type: string
        required: true
      store_type:
        description: "AWS store type"
        type: choice
        required: true
        options:
          - Secrets Manager
          - Parameter Store
      environment:
        description: "Target environment"
        type: choice
        required: true
        options:
          - development
          - sandbox
          - production
      credential_prefix:
        description: "AWS name prefix (e.g. theidhem)"
        type: string
        required: false
        default: "theidhem-test"

concurrency:
  group: infisical-secret-${{ inputs.secret_path }}-${{ inputs.secret_name }}
  cancel-in-progress: false

jobs:
  create-secret:
    name: "Create ${{ inputs.secret_path }} → ${{ inputs.secret_name }}"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build infisical-sync
        run: go build -o infisical-sync .

      - name: Manual Approval
        if: inputs.environment == 'sandbox' || inputs.environment == 'production'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_ACTION_PAT }}
          approvers: TheIdhem
          minimum-approvals: 2
          issue-title: "Infisical Secret targeting ${{ inputs.environment }} — approval required"
          issue-body: >-
            ${{ format('Creating/updating secret **{0}/{1}** in **{2}**. Triggered by @{3}.',
              inputs.secret_path, inputs.secret_name, inputs.environment, github.actor) }}
          exclude-workflow-initiator-as-approver: false
          fail-on-denial: true
          additional-approved-words: "LFG"
          additional-denied-words: ""

      - name: Create / update secret
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_AWS_ROLE_NAME: ${{ secrets.INFISICAL_AWS_ROLE_NAME }}
        run: |
          ./infisical-sync secret \
            --secret-path "${{ inputs.secret_path }}" \
            --secret-name "${{ inputs.secret_name }}" \
            --secret-value "${{ inputs.secret_value }}" \
            --store-type "${{ inputs.store_type }}" \
            --category "${{ inputs.environment }}" \
            ${{ inputs.credential_prefix != '' && format('--credential-prefix {0}', inputs.credential_prefix) || '' }}
